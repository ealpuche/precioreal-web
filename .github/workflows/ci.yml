name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run check
  EOF

# Placeholder mínimo para que Pages tenga qué servir desde el primer deploy
cat > public/index.html << 'EOF'
<!doctype html><html lang="es-MX"><head><meta charset="utf-8">
<title>PrecioReal — próximamente</title></head>
